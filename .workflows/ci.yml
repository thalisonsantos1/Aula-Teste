name: CI

# Dispara o workflow a cada push e a cada pull request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala o Python na versão desejada
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instala o pytest
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # 4. Executa os testes
      - name: Executar pytest
        run: pytest -v
